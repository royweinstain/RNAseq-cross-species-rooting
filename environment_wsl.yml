# Conda environment for WSL-based steps (read alignment, OrthoFinder)
# Create with: conda env create -f environment_wsl.yml
# Only needed if re-running from raw reads or re-running OrthoFinder
name: bioinfo
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - hisat2=2.2.2
  - samtools=1.23
  - subread=2.1.1       # featureCounts
  - orthofinder=3.1.3
  - sra-tools=3.2.1
  - fastqc=0.12.1
  - diamond
  - famsa
  - fasttree
